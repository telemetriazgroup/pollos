services:
  pollos-dashboard:
    build: .
    container_name: pollos-dashboard
    ports:
      - "9601:9601"
    restart: unless-stopped
    volumes:
      - ./pollos_bebes.json:/app/pollos_bebes.json:ro
      - ./pollos_carga.json:/app/pollos_carga.json
    environment:
      STREAMLIT_SERVER_PORT: "9601"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
